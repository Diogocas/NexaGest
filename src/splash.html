<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaGest</title>
  <style>
    :root{color-scheme:dark;--blue:#2563eb;--cyan:#06b6d4;--green:#22c55e;--text:#eef4ff;--muted:#9fb0c8;--bg:#020617;--card:#0f172a}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 30% 10%,rgba(37,99,235,.25),transparent 35%),linear-gradient(145deg,#020617,#07111f 55%,#020617);font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--text);overflow:hidden}
    .splash{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:28px}.box{width:420px;border:1px solid rgba(37,99,235,.35);border-radius:28px;background:rgba(15,23,42,.82);box-shadow:0 30px 80px rgba(0,0,0,.45),0 0 50px rgba(37,99,235,.15);padding:30px;text-align:center;position:relative;overflow:hidden}.box:before{content:"";position:absolute;inset:-1px;border-radius:28px;background:linear-gradient(120deg,transparent,rgba(6,182,212,.22),transparent);transform:translateX(-100%);animation:shine 2.8s ease-in-out infinite}.logo{width:120px;height:120px;border-radius:28px;object-fit:cover;box-shadow:0 18px 45px rgba(37,99,235,.32);position:relative}.name{font-size:30px;font-weight:900;letter-spacing:.5px;margin:18px 0 4px}.tag{color:var(--muted);font-size:13px;letter-spacing:2px;text-transform:uppercase}.steps{margin:24px 0 0;text-align:left;display:grid;gap:10px}.step{display:flex;align-items:center;gap:10px;color:#c7d2e5;font-weight:700;font-size:14px}.dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 20px rgba(34,197,94,.75)}.bar{height:7px;background:#1e293b;border-radius:999px;overflow:hidden;margin-top:22px}.bar span{display:block;height:100%;width:60%;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--cyan));animation:load 1.8s ease-in-out infinite}.version{margin-top:16px;color:#64748b;font-size:12px}@keyframes load{0%{transform:translateX(-80%)}100%{transform:translateX(170%)}}@keyframes shine{0%,45%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  </style>
</head>
<body>
  <main class="splash">
    <section class="box">
      <img class="logo" src="assets/splash/nexagest-logo.png" alt="NexaGest">
      <div class="name">NexaGest</div>
      <div class="tag">Gestão completa • Resultados reais</div>
      <div class="steps">
        <div class="step"><span class="dot"></span> Preparando banco de dados</div>
        <div class="step"><span class="dot"></span> Carregando módulos</div>
        <div class="step"><span class="dot"></span> Inicializando interface</div>
      </div>
      <div class="bar"><span></span></div>
      <div class="version">NexaGest Professional</div>
    </section>
  </main>
</body>
</html>
